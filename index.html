<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Eyeshield 21</title>
</head>

<body>
   
    <div class="container mt-5 text-center">
        <img class="texto1" src="img/titulo.png" alt="">
    </div>

    <div id="mvplayer" class="container mt-5">
        <video id="videoPlayer" width="600" controls>
            <source id="videoSource" src="video/01.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="container mt-3">
        <div class="d-flex flex-column align-items-center">
            <button class="btn btnCap mb-3" type="button" data-toggle="collapse" data-target="#mvplaylist" aria-expanded="false" aria-controls="mvplaylist">
                Mostrar/Ocultar Capítulos
            </button>
            
            <div id="mvplaylist" class="collapse">
                <ul class="list-unstyled">
                    <li class="active"><a href="#" onclick="sendCommand('01.mp4')">Capítulo 1</a></li>
                    <li><a href="#" onclick="sendCommand('02.mp4')">Capítulo 2</a></li>
                    <li><a href="#" onclick="sendCommand('03.mp4')">Capítulo 3</a></li>
                    <li><a href="#" onclick="sendCommand('04.mp4')">Capítulo 4</a></li>
                    <li><a href="#" onclick="sendCommand('05.mp4')">Capítulo 5</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const socket = new WebSocket('ws://localhost:8080');
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');

            socket.addEventListener('message', event => {
                const data = JSON.parse(event.data);

                if (data.type === 'video') {
                    if (data.action === 'play') {
                        videoPlayer.play();
                    } else if (data.action === 'pause') {
                        videoPlayer.pause();
                    } else if (data.action === 'seek') {
                        videoPlayer.currentTime = data.time;
                    } else if (data.action === 'load') {
                        videoSource.src = 'video/' + data.fileName;
                        videoPlayer.load();
                    }
                }
            });

            videoPlayer.addEventListener('play', () => {
                socket.send(JSON.stringify({ type: 'video', action: 'play' }));
            });

            videoPlayer.addEventListener('pause', () => {
                socket.send(JSON.stringify({ type: 'video', action: 'pause' }));
            });

            videoPlayer.addEventListener('seeked', () => {
                socket.send(JSON.stringify({ type: 'video', action: 'seek', time: videoPlayer.currentTime }));
            });
        });

        function sendCommand(fileName) {
            const socket = new WebSocket('ws://localhost:8080');
            socket.addEventListener('open', () => {
                socket.send(JSON.stringify({ type: 'video', action: 'load', fileName: fileName }));
            });
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
